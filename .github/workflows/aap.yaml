name: Using Ansible Molecule, test the collection deployed from AAP

# on:
#   schedule:
#   - cron: "0 0 * * *"

on:
  pull_request:

jobs:
  create-aap-vm:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Install dependencies
          run: |
            ansible --version
            python -m venv venv
            source venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r testing-requirements.txt
            ansible-galaxy install -r requirements.yml
            ansible-galaxy install -r molecule/requirements.yml
        - name: Set up SSH key
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
        - name: Run molecule
          env:
            TAS_SINGLE_NODE_REGISTRY_USERNAME: ${{ secrets.TAS_SINGLE_NODE_REGISTRY_USERNAME }}
            TAS_SINGLE_NODE_REGISTRY_PASSWORD: ${{ secrets.TAS_SINGLE_NODE_REGISTRY_PASSWORD }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
            GITHUB_RUN_ID: ${{ github.run_id }}
          run: |
            source venv/bin/activate
            molecule reset
            molecule -v create --scenario-name aap
            molecule -v converge --scenario-name aap
            molecule -v destroy --scenario-name aap
        - name: Destroy molecule infrastructure
          env:
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          if: always()
          run: |
            source venv/bin/activate
            molecule destroy
