---
- name: Obtain Trillian Tree ID
  ansible.builtin.include_tasks: podman/createtree.yml
  vars:
    tas_single_node_treeid_config: "{{ tas_single_node_ctlog_treeid_config }}"

- name: Slurp ctlog Certificates
  ansible.builtin.slurp: 
    src: "{{ item }}"
  with_items: 
    - "{{tas_single_node_remote_fulcio_root_ca}}"
    - |
      {%- if tas_single_node_custom_ctlog_private_key_names != "" and tas_single_node_custom_ctlog_private_keys is defined -%}
      {{ tas_single_node_custom_ctlog_private_key_names }}
      {%- else -%} 
      {{tas_single_node_remote_private_key}} {%- endif -%}
    - |
      {%- if tas_single_node_custom_ctlog_public_key_names != "" and tas_single_node_custom_ctlog_private_keys is defined -%}
      {{ tas_single_node_custom_ctlog_public_key_names }}
      {%- else -%} 
      {{tas_single_node_remote_public_key}} {%- endif -%}
  register: remote_ctlog_certificates


- name: Load ctlog config content
  block:
    - name: Use Custom Config
      when: tas_single_node_custom_ctlog_config != ""
      ansible.builtin.set_fact:
        ctlog_config_content: '{{ tas_single_node_custom_ctlog_config }}'
    - name: Use Template Ctlog Config
      when: tas_single_node_custom_ctlog_config == ""
      ansible.builtin.set_fact:
        ctlog_config_content: "{{ lookup('ansible.builtin.template', 'configs/ctlog-config.j2') }}"

- name: Create ctlog configmap
  ansible.builtin.copy:
    content: "{{ configmap_content | to_nice_yaml(indent=2) }}"
    dest: "{{ tas_single_node_ctlog_configmap_config }}"
    mode: "0600"
  vars:
    configmap_content:
      kind: ConfigMap
      apiVersion: v1
      metadata:
        name: ctlog-config
        namespace: ctlog-system
      data:
        config: "{{ ctlog_config_content }}"
  register: configmap_result

- name: Create ctlog Secret
  ansible.builtin.copy:
    content: "{{ secret_content | to_nice_yaml(indent=2) }}"
    dest: "{{ tas_single_node_ctlog_secret }}"
    mode: "0600"
  vars:
    secret_content:
      kind: Secret
      apiVersion: v1
      metadata:
        name: ctlog-secret
        namespace: ctlog-system
      data:
        private0: |
          {{ (remote_ctlog_certificates.results | selectattr('source', 'equalto', '/etc/rhtas/certs/ctlog0.key') | list | first).content }}
        private1: |
          {{ (remote_ctlog_certificates.results | selectattr('source', 'equalto', '/etc/rhtas/certs/ctlog1.key') | list | first).content }}
        public0: |
          {{ (remote_ctlog_certificates.results | selectattr('source', 'equalto', '/etc/rhtas/certs/ctlog0.pub') | list | first).content }}
        public1: |
          {{ (remote_ctlog_certificates.results | selectattr('source', 'equalto', '/etc/rhtas/certs/ctlog0.pub') | list | first).content }}
        fulcio-0: |
          {{ (remote_ctlog_certificates.results | selectattr('source', 'equalto', tas_single_node_remote_fulcio_root_ca) | list | first).content }}
  register: secret_result

- name: Deploy ctlog Pod
  ansible.builtin.include_tasks: podman/install_manifest.yml
  vars:
    podman_spec:
      state: started
      systemd_file: ctlog
      network: "{{ tas_single_node_podman_network }}"
      kube_file_content: "{{ lookup('ansible.builtin.template', 'manifests/ctlog/ctlog.j2') | from_yaml }}"
      configmap: "{{ tas_single_node_ctlog_configmap_config }}"
      configmap_changed: "{{ configmap_result.changed }}"
      secret: "{{ tas_single_node_ctlog_secret }}"
      secret_changed: "{{ secret_result.changed }}"
