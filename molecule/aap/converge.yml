---
- name: Converge
  hosts: molecule
  gather_facts: true
  tags: aap_installation
  vars_files:
    - vars/vars.yml
    - vars/aap_nodes.yml
  tasks:
    # - name: Include aap variables
    #   ansible.builtin.include_vars:
    #     file: vars/aap_nodes.yml

    - name: Error out if registry username is not set
      ansible.builtin.fail:
        msg: "Username for registry.redhat.io is not set, please provide it via TAS_SINGLE_NODE_REGISTRY_USERNAME env variable"
      when: aap_setup_prep_inv_secrets.all.registry_username == ""

    - name: Error out if registry password is not set
      ansible.builtin.fail:
        msg: "Password for registry.redhat.io is not set, please provide it via TAS_SINGLE_NODE_REGISTRY_PASSWORD env variable"
      when: aap_setup_prep_inv_secrets.all.registry_password == ""


    # - name: Create a normal user for running the task
    #   ansible.builtin.user:
    #     name: nonroot
    #     state: present
    #     shell: /bin/bash
    #     create_home: true

    # make nonroot user sudo
    # - name: Add nonroot user to the sudoers file for passwordless sudo
    #   ansible.builtin.lineinfile:
    #     path: /etc/sudoers
    #     line: "nonroot ALL=(ALL) NOPASSWD:ALL"
    #     validate: 'visudo -cf %s'
    #     state: present

    # - name: Ensure nonroot user is in the sudo group (if applicable)
    #   ansible.builtin.user:
    #     name: nonroot
    #     groups: wheel
    #     append: true
    #   when: ansible_facts['distribution'] in ['CentOS', 'RedHat', 'Fedora']

    # - name: Grant nonroot permission to control podman.socket service
    #   ansible.builtin.lineinfile:
    #     path: /etc/sudoers
    #     line: "nonroot ALL=(ALL) NOPASSWD: /bin/systemctl start podman.socket, /bin/systemctl enable podman.socket, /bin/systemctl status podman.socket"
    #     validate: 'visudo -cf %s'
    #     state: present

    - name: Include and execute AAP utility roles for setup
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop:
        - infra.aap_utilities.aap_setup_download
        - infra.aap_utilities.aap_setup_prepare

    - name: Ensure ec2-user user has access to the setup directory
      ansible.builtin.file:
        path: "/var/tmp/ansible-automation-platform-containerized-setup-2.5-7"
        owner: ec2-user
        group: ec2-user
        mode: '0755'
      become: true
      become_user: root

    - name: Ensure ec2-user user has access to the inventory file
      ansible.builtin.file:
        path: "/var/tmp/ansible-automation-platform-containerized-setup-2.5-7/inventory"
        owner: ec2-user
        group: ec2-user
        mode: '0644'
      become: true
      become_user: root

    - name: Install AAP
      become: false
      become_user: ec2-user
      ansible.builtin.shell:
        cmd: |
          cd /var/tmp/ansible-automation-platform-containerized-setup-2.5-7
          ansible-playbook -i inventory ansible.containerized_installer.install

      changed_when: false
