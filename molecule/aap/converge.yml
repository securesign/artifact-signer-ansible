---
- name: Converge
  hosts: molecule
  gather_facts: true
  tasks:
    - name: Include aap variables
      ansible.builtin.include_vars:
        file: vars/aap_nodes.yml

    - name: Include and execute AAP utility roles for setup
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop:
        - infra.aap_utilities.aap_setup_download
        - infra.aap_utilities.aap_setup_prepare

    - name: Install AAP
      ansible.builtin.shell:
        cmd: cat /var/tmp/ansible-automation-platform-containerized-setup-2.5-*/inventory
